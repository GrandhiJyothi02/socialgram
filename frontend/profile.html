<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h2>📸 SocialGram</h2>

    <div>
        <button onclick="location.href='index.html'">
            🏠 Home
        </button>

        <button onclick="logout()">
            🚪 Logout
        </button>
    </div>
</nav>

<div class="profile-container">

    <div class="profile-header">

        <img
            src="https://randomuser.me/api/portraits/women/44.jpg"
            class="profile-pic"
        >

        <div class="profile-info">

            <h2>Jyothi</h2>

            <div class="stats">

                <div>
                    <strong>12</strong>
                    <p>Posts</p>
                </div>

                <div>
                    <strong>1.2K</strong>
                    <p>Followers</p>
                </div>

                <div>
                    <strong>850</strong>
                    <p>Following</p>
                </div>

            </div>

            <p class="bio">
                🌸 B.Tech IT Student <br>
                💻 Full Stack Developer <br>
                🚀 CodeAlpha Intern
            </p>

            <button class="edit-btn">
                Edit Profile
            </button>

        </div>

    </div>

    <hr>

    <h3 class="gallery-title">
        My Posts
    </h3>

    <div class="gallery">

        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=500">

        <img src="https://images.unsplash.com/photo-1551632811-561732d1e306?w=500">

        <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=500">

        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=500">

        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=500">

        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500">

    </div>

</div>

<script src="js/profile.js"></script>

</body>
</html>
